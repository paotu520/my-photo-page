    <!-- 游戏主界面 -->
    <div id="game-interface">
        <div class="left-panel">

        </div>

            <div class="game-header"><span id="gameHeader">水果配配对</span><button class="back-btn" id="backToTvBtn">返回绘本</button></div>

                <video class="pip-video" id="pipVideo" controls loop><source src="media/video/zhangyu_birthday.mp4" type="video/mp4"></video>

    <div class="confetti-container" id="confettiContainer"></div>

    <script>
        (function() {
            // ---------- 音频上下文 ----------
            let audioCtx = null;
            function initAudio() {
                if (audioCtx) return;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            function playBeep(freq, duration, type = 'sine', vol = 0.2) {
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.value = vol;
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            }
            function playClickSound() {
                initAudio();
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume().then(() => playBeep(700, 0.08, 'sine', 0.15));
                } else {
                    playBeep(700, 0.08, 'sine', 0.15);
                }
            }
            function playCorrectSound() {
                initAudio();
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume().then(() => {
                        playBeep(600, 0.1, 'sine', 0.15);
                        setTimeout(() => playBeep(800, 0.1, 'sine', 0.15), 100);
                    });
                } else {
                    playBeep(600, 0.1, 'sine', 0.15);
                    setTimeout(() => playBeep(800, 0.1, 'sine', 0.15), 100);
                }
            }
            function playWrongSound() {
                initAudio();
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume().then(() => playBeep(300, 0.15, 'sawtooth', 0.15));
                } else {
                    playBeep(300, 0.15, 'sawtooth', 0.15);
                }
            }
            function playWinSound() {
                initAudio();
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume().then(() => {
                        playBeep(600, 0.15, 'sine', 0.2);
                        setTimeout(() => playBeep(800, 0.15, 'sine', 0.2), 150);
                        setTimeout(() => playBeep(1000, 0.3, 'sine', 0.2), 300);
                    });
                } else {
                    playBeep(600, 0.15, 'sine', 0.2);
                    setTimeout(() => playBeep(800, 0.15, 'sine', 0.2), 150);
                    setTimeout(() => playBeep(1000, 0.3, 'sine', 0.2), 300);
                }
            }
            function startConfetti() {
                const container = document.getElementById('confettiContainer');
                container.innerHTML = '';
                const emojis = ['🎉', '✨', '🌸', '🎊', '🌟', '💫', '🦑', '🐙', '🍰', '🎂'];
                for (let i = 0; i < 30; i++) {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    confetti.style.fontSize = (Math.random() * 1.5 + 1.5) + 'rem';
                    confetti.style.opacity = Math.random() * 0.8 + 0.2;
                    confetti.style.animationDelay = Math.random() * 0.5 + 's';
                    container.appendChild(confetti);
                }
                setTimeout(() => { container.innerHTML = ''; }, 5000);
            }

            // 背景音乐
            const bgMusic = document.getElementById('bgMusic');
            let musicStarted = false;
            function startBackgroundMusic() {
                if (!musicStarted) {
                    bgMusic.volume = 0.1;
                    bgMusic.play().catch(e => console.log('背景音乐播放失败:', e));
                    musicStarted = true;
                }
            }

            // DOM 元素
            const startScreen = document.getElementById('start-screen');
            const tvPage = document.getElementById('tv-page');
            const gameInterface = document.getElementById('game-interface');
            const startBtn = document.getElementById('startBtn');
            const octopusImg = document.getElementById('octopusImg');
            const enterGameBtn = document.getElementById('enterGameBtn');
            const backToTvBtn = document.getElementById('backToTvBtn');
            const navItems = document.querySelectorAll('#game-interface .nav-item');
            const gameHeader = document.getElementById('gameHeader');
            const gameArea = document.getElementById('gameArea');

            // 辅助函数
            function shuffleArray(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }
            function checkAllMatched(panel) {
                const container = gameArea;
                const matchedCards = container.querySelectorAll('.game-card.matched');
                const totalPairs = 5;
                if (matchedCards.length === totalPairs * 2) {
                    let msg = document.createElement('div');
                    msg.className = 'congrats-message';
                    msg.innerText = '🎉 恭喜你！全部配对正确！ 🎉';
                    if (!container.querySelector('.congrats-message')) {
                        container.prepend(msg);
                    }
                    backToTvBtn.classList.add('highlight');
                    playWinSound();
                    startConfetti();
                } else {
                    backToTvBtn.classList.remove('highlight');
                    const oldMsg = container.querySelector('.congrats-message');
                    if (oldMsg) oldMsg.remove();
                }
            }

            // ========== 水果配配对 ==========
            function renderFruitGame() {
                let animals = [{ id: '0', img: 'media/images/animal_spider.png' },{ id: '1', img: 'media/images/animal_bear.png' },{ id: '2', img: 'media/images/animal_pig.png' },{ id: '3', img: 'media/images/animal_mouse.png' },{ id: '4', img: 'media/images/animal_zebra.png' }];
                let fruits = [{ id: '0', img: 'media/images/fruit_blueberry.png' },{ id: '1', img: 'media/images/fruit_pineapple.png' },{ id: '2', img: 'media/images/fruit_pomegranate.png' },{ id: '3', img: 'media/images/fruit_kiwi.png' },{ id: '4', img: 'media/images/fruit_watermelon.png' }];
                animals = shuffleArray(animals); fruits = shuffleArray(fruits);
                return `<div class="instruction-text">点击动物，按住鼠标拖动到对应的水果上连线吧</div>
                        <div class="row-container" id="fruit-animals">${animals.map(a => `<div class="game-card" data-type="animal" data-id="${a.id}"><img src="${a.img}" class="animal-img" alt="animal"></div>`).join('')}</div>
                        <div class="row-container" id="fruit-fruits">${fruits.map(f => `<div class="game-card" data-type="fruit" data-id="${f.id}"><img src="${f.img}" class="fruit-img" alt="fruit"></div>`).join('')}</div>
                        <div class="flex-center"><button class="reset-btn" id="resetFruit">重新配对</button></div>`;
            }
            function attachFruitEvents() {
                const container = gameArea;
                const animals = container.querySelectorAll('.game-card[data-type="animal"]');
                let dragging = false, startCard = null, startX = 0, startY = 0, canvas = null, ctx = null;
                function createCanvas() { canvas = document.createElement('canvas'); canvas.className = 'line-canvas'; canvas.width = container.offsetWidth; canvas.height = container.offsetHeight; canvas.style.width = container.offsetWidth + 'px'; canvas.style.height = container.offsetHeight + 'px'; container.appendChild(canvas); ctx = canvas.getContext('2d'); }
                function removeCanvas() { if(canvas){ canvas.remove(); canvas = null; ctx = null; } }
                function drawLine(x1,y1,x2,y2) { if(!ctx) return; ctx.clearRect(0,0,canvas.width,canvas.height); ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.strokeStyle='#ff4d4d'; ctx.lineWidth=4; ctx.stroke(); }
                function getCardCenter(card){ const rect=card.getBoundingClientRect(); const containerRect=container.getBoundingClientRect(); return { x: rect.left+rect.width/2-containerRect.left, y: rect.top+rect.height/2-containerRect.top }; }
                animals.forEach(animal=>{
                    animal.addEventListener('mousedown',(e)=>{
                        e.preventDefault(); if(animal.classList.contains('matched')) return; removeCanvas(); dragging=true; startCard=animal; const center=getCardCenter(animal); startX=center.x; startY=center.y; createCanvas();
                    });
                });
                container.addEventListener('mousemove',(e)=>{ if(!dragging||!startCard||!canvas) return; const rect=container.getBoundingClientRect(); const mouseX=e.clientX-rect.left, mouseY=e.clientY-rect.top; drawLine(startX,startY,mouseX,mouseY); });
                container.addEventListener('mouseup',(e)=>{
                    if(!dragging||!startCard){ removeCanvas(); dragging=false; startCard=null; return; }
                    const target=document.elementFromPoint(e.clientX,e.clientY);
                    const fruitCard=target?.closest('.game-card[data-type="fruit"]');
                    if(fruitCard && !fruitCard.classList.contains('matched') && !startCard.classList.contains('matched')){
                        if(startCard.dataset.id===fruitCard.dataset.id){
                            playCorrectSound(); startCard.classList.add('celebrate'); fruitCard.classList.add('celebrate');
                            setTimeout(()=>{ startCard.classList.remove('celebrate'); fruitCard.classList.remove('celebrate'); },400);
                            startCard.classList.add('matched'); fruitCard.classList.add('matched'); checkAllMatched('fruit');
                        } else {
                            playWrongSound(); fruitCard.classList.add('error-flash'); startCard.classList.add('error-flash');
                            setTimeout(()=>{ fruitCard.classList.remove('error-flash'); startCard.classList.remove('error-flash'); },300);
                        }
                    }
                    removeCanvas(); dragging=false; startCard=null;
                });
                document.addEventListener('mouseup',()=>{ if(dragging){ removeCanvas(); dragging=false; startCard=null; } });
                const resetBtn=document.getElementById('resetFruit'); if(resetBtn) resetBtn.addEventListener('click',()=>{ playClickSound(); renderPanel('fruit'); });
            }

            // ========== 数量我知道 ==========
            function renderNumberGame() {
                let quantities = [{ id:'0', imgs:['media/images/fruit_blueberry.png'] },{ id:'1', imgs:['media/images/fruit_pineapple.png','media/images/fruit_pineapple.png'] },{ id:'2', imgs:['media/images/fruit_pomegranate.png','media/images/fruit_pomegranate.png','media/images/fruit_pomegranate.png'] },{ id:'3', imgs:['media/images/fruit_kiwi.png','media/images/fruit_kiwi.png','media/images/fruit_kiwi.png','media/images/fruit_kiwi.png'] },{ id:'4', imgs:['media/images/fruit_watermelon.png','media/images/fruit_watermelon.png','media/images/fruit_watermelon.png','media/images/fruit_watermelon.png','media/images/fruit_watermelon.png'] }];
                let digits = [{ id:'0', text:'1️⃣' },{ id:'1', text:'2️⃣' },{ id:'2', text:'3️⃣' },{ id:'3', text:'4️⃣' },{ id:'4', text:'5️⃣' }];
                quantities=shuffleArray(quantities); digits=shuffleArray(digits);
                return `<div class="instruction-text">把水果数量与对应数字配一配吧</div>
                        <div class="row-container" id="quantity-items">${quantities.map(q=>`<div class="game-card" data-type="quantity" data-id="${q.id}"><div class="fruit-multiple">${q.imgs.map(src=>`<img src="${src}" class="fruit-img">`).join('')}</div></div>`).join('')}</div>
                        <div class="row-container" id="digit-items">${digits.map(d=>`<div class="game-card" data-type="digit" data-id="${d.id}"><span class="digit-card">${d.text}</span></div>`).join('')}</div>
                        <div class="flex-center"><button class="reset-btn" id="resetNumber">重新配对</button></div>`;
            }
            function attachNumberEvents() {
                const container = gameArea; let activeQuantity=null, activeDigit=null;
                function clearActive(){ container.querySelectorAll('.game-card.active').forEach(c=>c.classList.remove('active')); activeQuantity=null; activeDigit=null; }
                function attemptPair(q,d){
                    if(q.dataset.id===d.dataset.id){ playCorrectSound(); q.classList.add('celebrate'); d.classList.add('celebrate'); setTimeout(()=>{ q.classList.remove('celebrate'); d.classList.remove('celebrate'); },400); q.classList.add('matched'); d.classList.add('matched'); checkAllMatched('number'); }
                    else { playWrongSound(); q.classList.add('error-flash'); d.classList.add('error-flash'); setTimeout(()=>{ q.classList.remove('error-flash'); d.classList.remove('error-flash'); },300); }
                    clearActive();
                }
                container.addEventListener('click',(e)=>{
                    const card=e.target.closest('.game-card'); if(!card||card.classList.contains('matched')) return;
                    const type=card.dataset.type; card.classList.remove('error-flash');
                    if(type==='quantity'){ if(activeDigit) attemptPair(card,activeDigit); else { clearActive(); card.classList.add('active'); activeQuantity=card; } }
                    else if(type==='digit'){ if(activeQuantity) attemptPair(activeQuantity,card); else { clearActive(); card.classList.add('active'); activeDigit=card; } }
                });
                const resetBtn=document.getElementById('resetNumber'); if(resetBtn) resetBtn.addEventListener('click',()=>{ playClickSound(); renderPanel('number'); });
            }

            // ========== 时间小侦探 ==========
            function renderTimeGame() {
                const animals = [{ id:'0', img:'media/images/animal_spider.png' },{ id:'1', img:'media/images/animal_bear.png' },{ id:'2', img:'media/images/animal_pig.png' },{ id:'3', img:'media/images/animal_mouse.png' },{ id:'4', img:'media/images/animal_zebra.png' }];
                const clocks = [{ id:'0', emoji:'🕑', time:'2:00' },{ id:'1', emoji:'🕒', time:'3:00' },{ id:'2', emoji:'🕓', time:'4:00' },{ id:'3', emoji:'🕔', time:'5:00' },{ id:'4', emoji:'🕕', time:'6:00' }];
                return `<div class="instruction-text">用放大镜看一看，小动物们几点到达？</div>
                        <div class="row-container" id="time-animals">${animals.map(a=>`<div class="game-card" data-type="timeAnimal" data-id="${a.id}"><img src="${a.img}" class="animal-img" alt="animal"></div>`).join('')}</div>
                        <div class="row-container" id="time-clocks">${clocks.map(c=>`<div class="game-card" data-type="timeClock" data-id="${c.id}"><div class="clock-card-content"><span class="clock-emoji">${c.emoji}</span><span class="clock-time">${c.time}</span></div></div>`).join('')}</div>`;
            }
            function attachTimeEvents() {
                const container = gameArea; container.style.position='relative';
                const mask=document.createElement('div'); mask.className='time-mask'; container.appendChild(mask);
                const magnifier=document.createElement('div'); magnifier.className='time-magnifier'; magnifier.textContent='🔍'; container.appendChild(magnifier);
                const rect=container.getBoundingClientRect(); const cx=rect.width/2, cy=rect.height/2;
                mask.style.setProperty('--x',cx+'px'); mask.style.setProperty('--y',cy+'px'); magnifier.style.left=cx+'px'; magnifier.style.top=cy+'px'; magnifier.style.display='flex';
                container.addEventListener('mousemove',(e)=>{ const r=container.getBoundingClientRect(); let x=e.clientX-r.left, y=e.clientY-r.top; x=Math.max(0,Math.min(r.width,x)); y=Math.max(0,Math.min(r.height,y)); mask.style.setProperty('--x',x+'px'); mask.style.setProperty('--y',y+'px'); magnifier.style.left=x+'px'; magnifier.style.top=y+'px'; });
                container.addEventListener('mouseenter',()=>{ magnifier.style.display='flex'; }); container.addEventListener('mouseleave',()=>{ magnifier.style.display='none'; });
                container.addEventListener('touchmove',(e)=>{ e.preventDefault(); const touch=e.touches[0]; const r=container.getBoundingClientRect(); let x=touch.clientX-r.left, y=touch.clientY-r.top; x=Math.max(0,Math.min(r.width,x)); y=Math.max(0,Math.min(r.height,y)); mask.style.setProperty('--x',x+'px'); mask.style.setProperty('--y',y+'px'); magnifier.style.left=x+'px'; magnifier.style.top=y+'px'; });
                container.addEventListener('touchstart',()=>{ magnifier.style.display='flex'; }); container.addEventListener('touchend',()=>{ magnifier.style.display='none'; });
            }

            // ========== 排队小达人 ==========
            const CORRECT_ORDER = ['spider', 'bear', 'pig', 'mouse', 'zebra', 'turtle'];
            const ANIMALS = [{ id:'bear', img:'media/images/animal_bear_family.png', name:'熊一家' },{ id:'pig', img:'media/images/animal_pig_family.png', name:'小猪一家' },{ id:'mouse', img:'media/images/animal_mouse_family.png', name:'老鼠一家' },{ id:'zebra', img:'media/images/animal_zebra_family.png', name:'斑马一家' },{ id:'turtle', img:'media/images/animal_turtle.png', name:'乌龟' }];
            function renderOrderGame() {
                let slots = [];
                for(let i=0;i<6;i++){ if(i===0) slots.push(`<div class="slot-card filled" data-index="0"><img src="media/images/animal_spider.png" alt="蜘蛛"></div>`); else slots.push(`<div class="slot-card" data-index="${i}" data-filled="false"><span class="slot-placeholder">?</span></div>`); }
                const shuffledAnimals=shuffleArray([...ANIMALS]);
                return `<div class="instruction-text">找出小动物正确的参加生日派对的顺序吧。</div><div class="order-top"><div class="order-slots" id="order-slots">${slots.join('')}</div></div><div class="order-bottom" id="order-bottom">${shuffledAnimals.map(animal=>`<div class="draggable-card" draggable="true" data-id="${animal.id}" data-name="${animal.name}"><img src="${animal.img}" alt="${animal.name}"></div>`).join('')}</div><div class="flex-center"><button class="reset-btn" id="resetOrder">重新排队</button></div>`;
            }
            function attachOrderEvents() {
                const slots=document.querySelectorAll('.slot-card[data-index]:not([data-index="0"])');
                const draggables=document.querySelectorAll('.draggable-card');
                draggables.forEach(drag=>{ drag.addEventListener('dragstart',(e)=>{ e.dataTransfer.setData('text/plain',drag.dataset.id); e.dataTransfer.effectAllowed='move'; }); });
                slots.forEach(slot=>{
                    slot.addEventListener('dragover',(e)=>{ e.preventDefault(); e.dataTransfer.dropEffect='move'; });
                    slot.addEventListener('drop',(e)=>{
                        e.preventDefault(); if(slot.dataset.filled==='true'){ playWrongSound(); return; }
                        const draggedId=e.dataTransfer.getData('text/plain'); const slotIndex=parseInt(slot.dataset.index); const correctId=CORRECT_ORDER[slotIndex];
                        if(draggedId===correctId){
                            playCorrectSound(); const animalImg=ANIMALS.find(a=>a.id===draggedId).img; slot.innerHTML=`<img src="${animalImg}" alt="${draggedId}">`; slot.classList.add('filled'); slot.dataset.filled='true';
                            const draggedCard=Array.from(draggables).find(card=>card.dataset.id===draggedId); if(draggedCard) draggedCard.remove();
                            const filledSlots=document.querySelectorAll('.slot-card[data-filled="true"]'); if(filledSlots.length===5){ let msg=document.createElement('div'); msg.className='congrats-message'; msg.innerText='🎉 恭喜你！排队顺序正确！ 🎉'; if(!gameArea.querySelector('.congrats-message')) gameArea.prepend(msg); backToTvBtn.classList.add('highlight'); playWinSound(); startConfetti(); }
                        } else { playWrongSound(); slot.classList.add('error-flash'); setTimeout(()=>slot.classList.remove('error-flash'),300); }
                    });
                });
                const resetBtn=document.getElementById('resetOrder'); if(resetBtn) resetBtn.addEventListener('click',()=>{ playClickSound(); renderPanel('order'); });
            }

            // ========== 转盘讲故事 ==========
            const STORY_ANIMALS = [{ id:'spider', img:'media/images/animal_spider.png', name:'蜘蛛' },{ id:'bear', img:'media/images/animal_bear_family.png', name:'熊一家' },{ id:'pig', img:'media/images/animal_pig_family.png', name:'小猪一家' },{ id:'mouse', img:'media/images/animal_mouse_family.png', name:'老鼠一家' },{ id:'zebra', img:'media/images/animal_zebra_family.png', name:'斑马一家' },{ id:'turtle', img:'media/images/animal_turtle.png', name:'乌龟' }];
            function renderStoryGame() {
                return `<div class="instruction-text">转一转，一起说说他们的故事吧！</div><div class="story-wheel-container"><div class="wheel" id="storyWheel"><div class="wheel-left"><div class="images-row"><img src="media/images/zhangyu.png" alt="章鱼先生"><img src="media/images/cake.png" alt="蛋糕" onerror="this.style.display='none'"></div><div class="curve-title"><span>章</span><span>鱼</span><span>先</span><span>生</span><span>过</span><span>生</span><span>日</span></div></div><div class="wheel-right"><div class="animal-spot" id="storyAnimalSpot"><span>?</span></div></div></div><button class="story-start-btn" id="storyStartBtn"></button></div>`;
            }
            function attachStoryEvents() {
                const wheel=document.getElementById('storyWheel'); const startBtn=document.getElementById('storyStartBtn'); const spot=document.getElementById('storyAnimalSpot'); let spinTimer=null;
                if(!wheel||!startBtn||!spot) return;
                startBtn.addEventListener('click',()=>{ playClickSound(); if(spinTimer) clearTimeout(spinTimer); wheel.classList.remove('spinning'); void wheel.offsetWidth; wheel.classList.add('spinning'); spinTimer=setTimeout(()=>{ wheel.classList.remove('spinning'); spinTimer=null; const randomIndex=Math.floor(Math.random()*STORY_ANIMALS.length); const animal=STORY_ANIMALS[randomIndex]; spot.innerHTML=`<img src="${animal.img}" alt="${animal.name}" style="width:100%; height:100%; object-fit:contain;">`; playCorrectSound(); },3000); });
            }

            // 渲染面板主函数
            function renderPanel(panel) {
                if(panel==='fruit'){ gameHeader.innerText='🍎 水果配配对'; gameArea.innerHTML=renderFruitGame(); attachFruitEvents(); }
                else if(panel==='order'){ gameHeader.innerText='🐾 排队小达人'; gameArea.innerHTML=renderOrderGame(); setTimeout(()=>attachOrderEvents(),0); }
                else if(panel==='number'){ gameHeader.innerText='🔢 数量我知道'; gameArea.innerHTML=renderNumberGame(); attachNumberEvents(); }
                else if(panel==='time'){ gameHeader.innerText='⏰ 时间小侦探'; gameArea.innerHTML=renderTimeGame(); setTimeout(()=>attachTimeEvents(),0); }
                else if(panel==='story'){ gameHeader.innerText='📖 转盘讲故事'; gameArea.innerHTML=renderStoryGame(); setTimeout(()=>attachStoryEvents(),0); }
                backToTvBtn.classList.remove('highlight');
            }

            // 导航点击
            navItems.forEach(item=>{
                item.addEventListener('click',()=>{ playClickSound(); const panel=item.dataset.panel; navItems.forEach(n=>n.classList.remove('active')); item.classList.add('active'); renderPanel(panel); });
            });

            // 开始按钮：封面 -> 电视机页面
            startBtn.addEventListener('click', () => {
                initAudio();
                playClickSound();
                startScreen.style.opacity = '0';
                setTimeout(() => {
                    startScreen.style.display = 'none';
                    tvPage.classList.add('show');
                }, 400);
            });

            // 进入游戏按钮：电视机 -> 游戏界面
            enterGameBtn.addEventListener('click', () => {
                startBackgroundMusic();
                playClickSound();
                tvPage.classList.remove('show');
                gameInterface.classList.add('show');
                navItems.forEach(n => n.classList.remove('active'));
                document.querySelector('[data-panel="fruit"]').classList.add('active');
                renderPanel('fruit');
            });

            // 返回绘本按钮
            backToTvBtn.addEventListener('click', () => {
                playClickSound();
                gameInterface.classList.remove('show');
                tvPage.classList.add('show');
            });

            // 章鱼图片点击音效
            octopusImg.addEventListener('click', (e) => {
                e.stopPropagation();
                initAudio();
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume().then(() => {
                        playBeep(600, 0.1, 'sine', 0.15);
                        setTimeout(() => playBeep(800, 0.1, 'sine', 0.15), 50);
                    });
                } else {
                    playBeep(600, 0.1, 'sine', 0.15);
                    setTimeout(() => playBeep(800, 0.1, 'sine', 0.15), 50);
                }
                octopusImg.style.transform = 'scale(0.9)';
                setTimeout(() => { octopusImg.style.transform = ''; }, 150);
            });

            // 画中画按钮控制
            const pipVideo = document.getElementById('pipVideo');
            if(pipVideo){
                const pipBtns = document.querySelectorAll('.pip-btn');
                pipBtns.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const action = btn.getAttribute('data-action');
                        if(action === 'play') pipVideo.play();
                        else if(action === 'pause') pipVideo.pause();
                        else if(action === 'volume-up') pipVideo.volume = Math.min(1, pipVideo.volume+0.1);
                        else if(action === 'volume-down') pipVideo.volume = Math.max(0, pipVideo.volume-0.1);
                    });
                });
            }

            // 初始隐藏电视机和游戏界面
            gameInterface.classList.remove('show');
            tvPage.classList.remove('show');
        })();
    </script>
</body>
</html>
